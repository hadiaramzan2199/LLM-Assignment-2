# Default configuration for MTRAGEval baselines

project:
  name: "MTRAGEval-Baselines"
  version: "1.0.0"
  team: "CS-818-Project"

data:
  raw_dir: "./data/raw"
  processed_dir: "./data/processed"
  cache_dir: "./cache"
  
  chunk_size: 512
  chunk_overlap: 128
  min_chunk_length: 50

retrieval:
  top_k: 10
  use_history: true
  
  bm25:
    k1: 1.5
    b: 0.75
  
  dense:
    model_name: "sentence-transformers/all-mpnet-base-v2"
    batch_size: 32

generation:
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.95
  top_k: 50
  do_sample: true
  num_beams: 1
  repetition_penalty: 1.1
  use_history: true
  
  llama3_8b:
    model_name: "meta-llama/Meta-Llama-3-8B-Instruct"
    quantization: "4bit"
  
  qwen2_5_7b:
    model_name: "Qwen/Qwen2.5-7B-Instruct"
    quantization: "4bit"

evaluation:
  retrieval_ks: [1, 3, 5, 10]
  generation_metrics: ["rouge1", "rouge2", "rougeL", "bertscore"]
  
logging:
  use_wandb: false
  log_dir: "./artifacts/logs"
  save_predictions: true
  save_results: true

reproducibility:
  seed: 42
  deterministic: true