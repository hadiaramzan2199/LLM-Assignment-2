# Llama-3-8B generation configuration

generation:
  model_name: "meta-llama/Meta-Llama-3-8B-Instruct"
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.95
  top_k: 50
  do_sample: true
  num_beams: 1
  repetition_penalty: 1.1
  use_history: true
  
  quantization: "4bit"
  device_map: "auto"

data:
  split: "validation"
  max_examples: null  # Set to limit for testing

output:
  predictions_dir: "./artifacts/results/task_b_llama3"

reproducibility:
  seed: 42